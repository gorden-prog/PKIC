<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Смещение блоков</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4 bg-light">

  <div class="row mb-3">
    <div class="col-4 bg-danger-subtle p-3">
      Крутой блок, верно?
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-4 offset-3 bg-warning-subtle p-3">
      Но посмотрите на этот
    </div>
  </div>

  <div class="row">
    <div class="col-4 offset-6 bg-info-subtle p-3">
      Хотя чего там, этот самый крутой
    </div>
  </div>

</div>

</body>
</html>
