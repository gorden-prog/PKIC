<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Различные блоки</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

  <h1 class="mb-4">Различные блоки</h1>

  <div class="row mb-3">
    <div class="col-6 bg-danger-subtle p-2">Первый</div>
    <div class="col-6 bg-primary-subtle p-2">Второй</div>
  </div>

  <div class="row mb-3">
    <div class="col-2 bg-danger-subtle p-2">Первый</div>
    <div class="col-2 bg-primary-subtle p-2">Второй</div>
    <div class="col-2 bg-success-subtle p-2">Третий</div>
    <div class="col-2 bg-success p-2 text-white">Четвертый</div>
    <div class="col-2 bg-light border p-2">Пятый</div>
    <div class="col-2 bg-secondary-subtle p-2">Шестой</div>
  </div>

  <div class="row">
    <div class="col-3 bg-danger-subtle p-2">Первый</div>
    <div class="col-3 bg-primary-subtle p-2">Второй</div>
    <div class="col-2 bg-danger-subtle p-2">Первый</div>
    <div class="col-2 bg-primary-subtle p-2">Второй</div>
    <div class="col-2 bg-success-subtle p-2">Третий</div>
  </div>

</div>

</body>
</html>
